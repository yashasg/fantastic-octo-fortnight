# Eye & Posture Reminder — TestFlight Deployment
#
# Manual trigger only (workflow_dispatch). Run this after CI passes on main.
#
# Prerequisites before this workflow can succeed:
#   1. Apple Developer account enrolled in App Store Connect
#   2. Distribution certificate + App Store Connect provisioning profile uploaded as GitHub secrets
#   3. App Store Connect API key created and stored as secrets (see below)
#   4. Bundle ID registered and App Store Connect app record created
#
# Required GitHub Secrets:
#   BUILD_CERTIFICATE_BASE64        — p12 distribution cert, base64-encoded
#   P12_PASSWORD                    — p12 passphrase
#   BUILD_PROVISION_PROFILE_BASE64  — .mobileprovision, base64-encoded
#   KEYCHAIN_PASSWORD               — ephemeral keychain password (any random string)
#   ASC_API_KEY_BASE64              — App Store Connect API key (.p8), base64-encoded
#   ASC_KEY_ID                      — API key ID (e.g. ABCDEF1234)
#   ASC_ISSUER_ID                   — API issuer ID (UUID from App Store Connect)
#
# Optional after Screen Time entitlement/profile approval (#201):
#   SHIELD_CONFIG_PROVISION_PROFILE_BASE64   — ShieldConfiguration .mobileprovision
#   DEVICE_ACTIVITY_PROVISION_PROFILE_BASE64 — DeviceActivityMonitor .mobileprovision
#   SHIELD_CONFIG_PROFILE_SPECIFIER          — ShieldConfiguration profile name
#   DEVICE_ACTIVITY_PROFILE_SPECIFIER        — DeviceActivityMonitor profile name
#
name: TestFlight Deploy

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Marketing version to deploy (e.g. 0.1.0)"
        required: true
        default: "0.1.0"

permissions:
  contents: read
  actions: read
  checks: read

env:
  XCODE_VERSION: "16.2"
  SCHEME: "EyePostureReminder"
  DERIVED_DATA_PATH: "${{ github.workspace }}/DerivedData"

jobs:
  deploy-testflight:
    name: Archive & Upload to TestFlight
    runs-on: macos-15
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── CI gate ───────────────────────────────────────────────────────────
      - name: Verify CI passed on this commit
        run: |
          for i in {1..40}; do
            STATUS=$(gh api "repos/${{ github.repository }}/commits/${{ github.sha }}/check-runs" \
              --jq '[.check_runs[] | select(.name == "Build & Test")] | first | .conclusion')
            if [[ "$STATUS" == "success" ]]; then break; fi
            if [[ "$STATUS" == "failure" || "$STATUS" == "cancelled" ]]; then
              echo "CI failed or cancelled (status: $STATUS). Aborting deploy."; exit 1
            fi
            echo "CI status: ${STATUS:-pending}. Waiting 30s (attempt $i/40)…"
            sleep 30
          done
          if [[ "$STATUS" != "success" ]]; then
            echo "CI did not succeed within timeout. Aborting."; exit 1
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Select Xcode ${{ env.XCODE_VERSION }}
        run: sudo xcode-select -switch /Applications/Xcode_${{ env.XCODE_VERSION }}.app/Contents/Developer

      # ── Versioning ────────────────────────────────────────────────────────
      - name: Set marketing version
        run: |
          ./scripts/build.sh version "${{ github.event.inputs.version }}"
          echo "MARKETING_VERSION=${{ github.event.inputs.version }}" >> $GITHUB_ENV
          echo "BUILD_NUMBER=${{ github.run_number }}" >> $GITHUB_ENV

      # ── Code signing ──────────────────────────────────────────────────────
      - name: Install certificate and provisioning profile
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          BUILD_PROVISION_PROFILE_BASE64: ${{ secrets.BUILD_PROVISION_PROFILE_BASE64 }}
          SHIELD_CONFIG_PROVISION_PROFILE_BASE64: ${{ secrets.SHIELD_CONFIG_PROVISION_PROFILE_BASE64 }}
          DEVICE_ACTIVITY_PROVISION_PROFILE_BASE64: ${{ secrets.DEVICE_ACTIVITY_PROVISION_PROFILE_BASE64 }}
          SHIELD_CONFIG_PROFILE_SPECIFIER: ${{ secrets.SHIELD_CONFIG_PROFILE_SPECIFIER }}
          DEVICE_ACTIVITY_PROFILE_SPECIFIER: ${{ secrets.DEVICE_ACTIVITY_PROFILE_SPECIFIER }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          CERT_PATH="$RUNNER_TEMP/build_certificate.p12"
          PP_PATH="$RUNNER_TEMP/build_pp.mobileprovision"
          SHIELD_CONFIG_PP_PATH="$RUNNER_TEMP/shield_config_pp.mobileprovision"
          DEVICE_ACTIVITY_PP_PATH="$RUNNER_TEMP/device_activity_pp.mobileprovision"
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"

          echo -n "$BUILD_CERTIFICATE_BASE64" | base64 --decode -o "$CERT_PATH"
          echo -n "$BUILD_PROVISION_PROFILE_BASE64" | base64 --decode -o "$PP_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"

          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp "$PP_PATH" ~/Library/MobileDevice/Provisioning\ Profiles/

          EXTENSION_PROFILES_AVAILABLE=NO
          if [[ -n "${SHIELD_CONFIG_PROVISION_PROFILE_BASE64:-}" && \
                -n "${DEVICE_ACTIVITY_PROVISION_PROFILE_BASE64:-}" && \
                -n "${SHIELD_CONFIG_PROFILE_SPECIFIER:-}" && \
                -n "${DEVICE_ACTIVITY_PROFILE_SPECIFIER:-}" ]]; then
            echo -n "$SHIELD_CONFIG_PROVISION_PROFILE_BASE64" | base64 --decode -o "$SHIELD_CONFIG_PP_PATH"
            echo -n "$DEVICE_ACTIVITY_PROVISION_PROFILE_BASE64" | base64 --decode -o "$DEVICE_ACTIVITY_PP_PATH"
            cp "$SHIELD_CONFIG_PP_PATH" ~/Library/MobileDevice/Provisioning\ Profiles/
            cp "$DEVICE_ACTIVITY_PP_PATH" ~/Library/MobileDevice/Provisioning\ Profiles/
            EXTENSION_PROFILES_AVAILABLE=YES
            echo "Screen Time extension provisioning profiles installed."
          else
            echo "Screen Time extension provisioning profiles not configured; TestFlight upload will exclude extension targets."
          fi

          echo "EXTENSION_PROFILES_AVAILABLE=$EXTENSION_PROFILES_AVAILABLE" >> "$GITHUB_ENV"

      # ── xcodegen ─────────────────────────────────────────────────────────
      - name: Install xcodegen
        run: brew install xcodegen

      # ── Archive + Upload ──────────────────────────────────────────────────
      # build_signed.sh generates the required .xcodeproj (SPM executables
      # cannot be archived for iOS distribution without one), then archives,
      # injects BUILD_NUMBER into the archive's Info.plist, and uploads.
      - name: Archive and upload to TestFlight
        env:
          ASC_API_KEY_BASE64: ${{ secrets.ASC_API_KEY_BASE64 }}
          ASC_AUTH_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_AUTH_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          EXTENSION_PROFILES_AVAILABLE: ${{ env.EXTENSION_PROFILES_AVAILABLE }}
          SHIELD_CONFIG_PROFILE: ${{ secrets.SHIELD_CONFIG_PROFILE_SPECIFIER }}
          DEVICE_ACTIVITY_PROFILE: ${{ secrets.DEVICE_ACTIVITY_PROFILE_SPECIFIER }}
        run: |
          ASC_KEY_FILE="$RUNNER_TEMP/asc_api_key.p8"
          echo -n "$ASC_API_KEY_BASE64" | base64 --decode -o "$ASC_KEY_FILE"
          SIGNING_STYLE=manual \
            ASC_AUTH_KEY_PATH="$ASC_KEY_FILE" \
            ./scripts/build_signed.sh upload

      # ── Clean up API key ──────────────────────────────────────────────────
      - name: Clean up API key
        if: always()
        run: rm -f "$RUNNER_TEMP/asc_api_key.p8" || true

      # ── Upload IPA as artifact ────────────────────────────────────────────
      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: EyePostureReminder-${{ env.MARKETING_VERSION }}-build${{ env.BUILD_NUMBER }}.ipa
          path: DerivedData/SignedBuild/Export/EyePostureReminder.ipa
          retention-days: 30

      # ── Cleanup signing assets ────────────────────────────────────────────
      - name: Clean up keychain
        if: always()
        run: security delete-keychain "$RUNNER_TEMP/app-signing.keychain-db" || true
