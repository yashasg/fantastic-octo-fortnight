# Eye & Posture Reminder — CI/CD Pipeline
#
# Tag format (for release tracking):
#   v0.x.x  — During TestFlight beta phase (pre-App Store)
#   v1.0.0  — App Store launch and beyond
#
# Annotated tags only. Created after a successful upload, not before.
# Format: git tag -a v1.0.0 -m "Release 1.0.0, build ${{ github.run_number }}"

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  actions: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  XCODE_VERSION: "26.4"
  SCHEME: "EyePostureReminder"
  # No .xcodeproj — project uses Swift Package Manager.
  # xcodebuild resolves the package directly from Package.swift.
  SIMULATOR: "platform=iOS Simulator,name=iPhone 16"
  DERIVED_DATA_PATH: "${{ github.workspace }}/DerivedData"

jobs:
  build-and-test:
    name: Build & Test
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1

      - name: Select Xcode ${{ env.XCODE_VERSION }}
        run: |
          XCODE_PATH="/Applications/Xcode_${{ env.XCODE_VERSION }}.app/Contents/Developer"
          if [[ -d "$XCODE_PATH" ]]; then
            sudo xcode-select -switch "$XCODE_PATH"
          else
            echo "Xcode_${{ env.XCODE_VERSION }}.app not found; using current selection: $(xcode-select -p)"
          fi

      - name: Ensure iOS Simulator runtime
        run: |
          if ! xcrun simctl list devices available 2>/dev/null | grep -q "iPhone"; then
            echo "No iOS simulators found — downloading runtime…"
            xcodebuild -downloadPlatform iOS -quiet || true
          fi
          echo "Available iOS simulators:"
          xcrun simctl list devices available | grep -i iphone | head -5

      # ── Versioning ──────────────────────────────────────────────────────────
      # CFBundleShortVersionString is managed via: ./scripts/build.sh version <x.y.z>
      # CFBundleVersion is auto-incremented here from github.run_number (guaranteed unique + increasing).
      # EPRCommitHash is a custom key for traceability (not used by Apple — informational only).
      #
      # NOTE: agvtool requires an .xcodeproj. Once the Xcode project is created,
      # replace the PlistBuddy calls below with:
      #   agvtool new-version -all ${{ github.run_number }}
      - name: Set build number + inject commit hash
        run: |
          COMMIT_HASH=$(git rev-parse --short HEAD)
          BUILD_NUMBER=${{ github.run_number }}
          echo "BUILD_NUMBER=$BUILD_NUMBER" >> $GITHUB_ENV
          echo "GIT_COMMIT_HASH=$COMMIT_HASH" >> $GITHUB_ENV

          PLIST="EyePostureReminder/Info.plist"
          if [[ -f "$PLIST" ]]; then
            /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $BUILD_NUMBER" "$PLIST" 2>/dev/null || true
            /usr/libexec/PlistBuddy -c "Add :EPRCommitHash string $COMMIT_HASH" "$PLIST" 2>/dev/null || \
            /usr/libexec/PlistBuddy -c "Set :EPRCommitHash $COMMIT_HASH" "$PLIST"
            MARKETING_VER=$(/usr/libexec/PlistBuddy -c "Print :CFBundleShortVersionString" "$PLIST" 2>/dev/null || echo "unknown")
            echo "MARKETING_VERSION=$MARKETING_VER" >> $GITHUB_ENV
            echo "Injected build=$BUILD_NUMBER commit=$COMMIT_HASH marketing=$MARKETING_VER into $PLIST"
          else
            echo "MARKETING_VERSION=unknown" >> $GITHUB_ENV
            echo "note: Info.plist not found — versioning will be applied when .xcodeproj is created"
          fi

      # ── Dependency cache ─────────────────────────────────────────────────────
      - name: Cache DerivedData
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830  # v4.3.0
        with:
          path: ${{ env.DERIVED_DATA_PATH }}
          key: derived-data-branch-${{ runner.os }}-xcode${{ env.XCODE_VERSION }}-${{ github.head_ref || github.ref_name }}-${{ hashFiles('Package.swift', 'Package.resolved', 'scripts/build.sh', '.github/workflows/ci.yml') }}
          restore-keys: |
            derived-data-branch-${{ runner.os }}-xcode${{ env.XCODE_VERSION }}-${{ github.head_ref || github.ref_name }}-
            derived-data-branch-${{ runner.os }}-xcode${{ env.XCODE_VERSION }}-main-

      - name: Cache SwiftPM SourcePackages
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830  # v4.3.0
        with:
          path: ${{ env.DERIVED_DATA_PATH }}/SourcePackages
          key: spm-sourcepackages-${{ runner.os }}-xcode${{ env.XCODE_VERSION }}-${{ hashFiles('Package.resolved') }}
          restore-keys: |
            spm-sourcepackages-${{ runner.os }}-xcode${{ env.XCODE_VERSION }}-

      # ── Homebrew package cache ───────────────────────────────────────────────
      - name: Cache Homebrew packages
        id: brew-cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830  # v4.3.0
        with:
          path: |
            /opt/homebrew/Cellar/xcodegen
            /opt/homebrew/Cellar/swiftlint
          key: ${{ runner.os }}-brew-xcodegen-swiftlint-v1
          restore-keys: |
            ${{ runner.os }}-brew-xcodegen-swiftlint-

      # ── Screen Time extension scaffold ──────────────────────────────────────
      # Compile-only validation. Runtime FamilyControls/DeviceActivity behavior
      # still requires #201 entitlement approval and physical-device testing.

      # Guardrail: reject any commit that accidentally adds com.apple.developer.family-controls
      # to distribution entitlements before issue #201 (Apple entitlement approval) is resolved.
      # This prevents a fake-success archive that App Store Connect would reject on upload.
      - name: Validate distribution entitlements (no premature FamilyControls)
        run: |
          BLOCKED_KEY="com.apple.developer.family-controls"
          DIST_ENTITLEMENTS=(
            "EyePostureReminder/EyePostureReminder.Distribution.entitlements"
            "Extensions/ShieldConfigurationExtension/ShieldConfigurationExtension.Distribution.entitlements"
            "Extensions/DeviceActivityMonitorExtension/DeviceActivityMonitorExtension.Distribution.entitlements"
          )
          FAILED=0
          for f in "${DIST_ENTITLEMENTS[@]}"; do
            if [[ ! -f "$f" ]]; then
              echo "::warning::Distribution entitlements file not found: $f"
              continue
            fi
            if grep -q "$BLOCKED_KEY" "$f"; then
              echo "::error file=${f}::Distribution entitlements contain ${BLOCKED_KEY} but issue #201 (FamilyControls approval) is still open. Remove it or merge #201 first."
              FAILED=1
            fi
          done
          if [[ "$FAILED" -ne 0 ]]; then
            echo "Entitlements guardrail failed. See errors above."
            exit 1
          fi
          echo "Distribution entitlements guardrail passed — no premature FamilyControls key."

      - name: Install XcodeGen
        run: |
          if brew list xcodegen &>/dev/null 2>&1; then
            brew link --overwrite xcodegen 2>/dev/null || true
          else
            brew install xcodegen
          fi

      - name: Build Screen Time extensions (simulator, no signing)
        run: ./scripts/setup-screentime.sh --build

      # ── Build + lint + test ──────────────────────────────────────────────────
      - name: Install SwiftLint
        run: |
          if brew list swiftlint &>/dev/null 2>&1; then
            brew link --overwrite swiftlint 2>/dev/null || true
          else
            brew install swiftlint
          fi

      - name: Build, lint, and test (simulator)
        run: ./scripts/build.sh all

      # ── Coverage ─────────────────────────────────────────────────────────────
      - name: Report coverage
        if: always()
        run: |
          xcrun xccov view --report TestResults.xcresult

      - name: Enforce coverage threshold
        # Run on all outcomes so coverage is always enforced — even when earlier
        # steps fail — preventing asymmetric validation where a failing test run
        # silently bypasses the 80 % gate.
        if: success()
        run: |
          if [[ ! -d TestResults.xcresult ]]; then
            echo "::error::TestResults.xcresult not found — tests may have crashed before producing results"
            exit 1
          fi
          COVERAGE=$(xcrun xccov view --report --json TestResults.xcresult | python3 -c "import json,sys; raw=sys.stdin.read(); raw.strip() or (print('::error::Coverage JSON was empty from xccov', file=sys.stderr) or sys.exit(1)); data=json.loads(raw); line_coverage=data.get('lineCoverage'); isinstance(line_coverage, (int, float)) or (print('::error::Coverage JSON missing numeric lineCoverage', file=sys.stderr) or sys.exit(1)); print(line_coverage * 100)")
          if [[ ! "$COVERAGE" =~ ^[0-9]+([.][0-9]+)?$ ]]; then
            echo "::error::Computed coverage is not numeric: '$COVERAGE'"
            exit 1
          fi
          echo "Line coverage: ${COVERAGE}%"
          if (( $(echo "$COVERAGE < 80" | bc -l) )); then
            echo "::error::Coverage ${COVERAGE}% is below the minimum threshold (80%)"
            exit 1
          fi

      # ── Artifacts ────────────────────────────────────────────────────────────
      - name: Collect dSYMs
        if: always()
        run: |
          find "${{ env.DERIVED_DATA_PATH }}" -name "*.dSYM" -exec cp -r {} . \; 2>/dev/null || true

      - name: Upload dSYMs
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        if: always()
        with:
          name: dSYMs-${{ env.MARKETING_VERSION }}-build${{ github.run_number }}
          path: "*.dSYM"
          retention-days: 90
          if-no-files-found: warn

      - name: Upload test results
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        if: always()
        with:
          name: test-results-${{ env.MARKETING_VERSION }}-build${{ github.run_number }}
          path: TestResults.xcresult
          retention-days: 30
          if-no-files-found: error

  uitest-prepare:
    name: UI Tests / Prepare artifacts
    runs-on: macos-15
    needs: build-and-test
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1

      - name: Select Xcode ${{ env.XCODE_VERSION }}
        run: |
          XCODE_PATH="/Applications/Xcode_${{ env.XCODE_VERSION }}.app/Contents/Developer"
          if [[ -d "$XCODE_PATH" ]]; then
            sudo xcode-select -switch "$XCODE_PATH"
          else
            echo "Xcode_${{ env.XCODE_VERSION }}.app not found; using current selection: $(xcode-select -p)"
          fi

      - name: Ensure iOS Simulator runtime
        run: |
          if ! xcrun simctl list devices available 2>/dev/null | grep -q "iPhone"; then
            echo "No iOS simulators found — downloading runtime…"
            xcodebuild -downloadPlatform iOS -quiet || true
          fi
          echo "Available iOS simulators:"
          xcrun simctl list devices available | grep -i iphone | head -5

      - name: Generate UI test project
        run: |
          ./scripts/setup-uitests.sh

      - name: Build UI tests for testing (once)
        run: |
          xcodebuild build-for-testing \
            -project UITests/EyePostureReminderUITests.xcodeproj \
            -scheme EyePostureReminderUITests \
            -destination "${{ env.SIMULATOR }}" \
            -derivedDataPath "${{ env.DERIVED_DATA_PATH }}" \
            CODE_SIGN_IDENTITY= \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            ENABLE_BITCODE=NO \
            ENABLE_APP_INTENTS_METADATA_EXTRACTION=NO \
            ENABLE_APPINTENTS_METADATA_EXTRACTION=NO \
            SWIFT_TREAT_WARNINGS_AS_ERRORS=YES \
            GCC_TREAT_WARNINGS_AS_ERRORS=YES

      - name: Verify prebuilt xctestrun
        run: |
          XCTESTRUN_PATH=$(find "${{ env.DERIVED_DATA_PATH }}/Build/Products" \
            -name "EyePostureReminderUITests_*.xctestrun" -maxdepth 1 -print | sort | tail -1)
          if [[ -z "$XCTESTRUN_PATH" ]]; then
            echo "::error::No EyePostureReminderUITests_*.xctestrun found in prebuilt artifacts"
            exit 1
          fi
          echo "Prepared xctestrun: $XCTESTRUN_PATH"

      - name: Upload UI prebuilt artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: ui-prebuilt-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ env.DERIVED_DATA_PATH }}/Build/Products
          retention-days: 1
          if-no-files-found: error

  uitest-shard:
    name: UI Tests / ${{ matrix.shard.name }}
    runs-on: macos-15
    needs: uitest-prepare
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        shard:
          - id: onboarding
            name: Onboarding
            only_testing_csv: EyePostureReminderUITests/OnboardingFlowTests
          - id: home
            name: Home
            only_testing_csv: EyePostureReminderUITests/HomeScreenTests
          - id: settings
            name: Settings
            only_testing_csv: EyePostureReminderUITests/SettingsFlowTests
          - id: overlays-darkmode
            name: Overlays + Dark Mode
            only_testing_csv: EyePostureReminderUITests/OverlayTests,EyePostureReminderUITests/OverlayPresentationTests,EyePostureReminderUITests/OverlayPostureTests,EyePostureReminderUITests/DarkModeUITests

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1

      - name: Select Xcode ${{ env.XCODE_VERSION }}
        run: |
          XCODE_PATH="/Applications/Xcode_${{ env.XCODE_VERSION }}.app/Contents/Developer"
          if [[ -d "$XCODE_PATH" ]]; then
            sudo xcode-select -switch "$XCODE_PATH"
          else
            echo "Xcode_${{ env.XCODE_VERSION }}.app not found; using current selection: $(xcode-select -p)"
          fi

      - name: Ensure iOS Simulator runtime
        run: |
          if ! xcrun simctl list devices available 2>/dev/null | grep -q "iPhone"; then
            echo "No iOS simulators found — downloading runtime…"
            xcodebuild -downloadPlatform iOS -quiet || true
          fi
          echo "Available iOS simulators:"
          xcrun simctl list devices available | grep -i iphone | head -5

      - name: Download UI prebuilt artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4
        with:
          name: ui-prebuilt-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ env.DERIVED_DATA_PATH }}/Build/Products

      - name: Boot Simulator
        run: |
          # Erase to ensure a clean state (avoids stale SpringBoard caches)
          xcrun simctl shutdown "iPhone 16" 2>/dev/null || true
          xcrun simctl erase "iPhone 16" 2>/dev/null || true
          xcrun simctl boot "iPhone 16" 2>/dev/null || true
          # Wait for simulator to finish booting
          xcrun simctl bootstatus "iPhone 16" -b 2>/dev/null || sleep 10
          # Wait for SpringBoard to be fully initialized (critical for UI tests)
          echo "Waiting for SpringBoard to finish launching…"
          for i in $(seq 1 30); do
            if xcrun simctl spawn booted launchctl print system 2>/dev/null | grep -q "com.apple.SpringBoard"; then
              echo "SpringBoard is ready (after ${i}s)"
              break
            fi
            sleep 1
          done
          # Extra settle time for system services
          sleep 5

      - name: Run UI Tests (shard ${{ matrix.shard.id }})
        run: |
          XCTESTRUN_PATH=$(find "${{ env.DERIVED_DATA_PATH }}/Build/Products" \
            -name "EyePostureReminderUITests_*.xctestrun" -maxdepth 1 -print | sort | tail -1)
          if [[ -z "$XCTESTRUN_PATH" ]]; then
            echo "::error::Prebuilt xctestrun not found in downloaded artifacts"
            exit 1
          fi

          IFS=',' read -r -a ONLY_TESTING_FILTERS <<< "${{ matrix.shard.only_testing_csv }}"
          CMD=(./scripts/build.sh uitest --xctestrun-path "$XCTESTRUN_PATH" --result-bundle-path "UITestResults-${{ matrix.shard.id }}.xcresult")
          for FILTER in "${ONLY_TESTING_FILTERS[@]}"; do
            FILTER="$(echo "$FILTER" | xargs)"
            [[ -n "$FILTER" ]] && CMD+=(--only-testing "$FILTER")
          done
          "${CMD[@]}"

      - name: Upload UI test results
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        if: always()
        with:
          name: ui-test-results-${{ matrix.shard.id }}-build${{ github.run_number }}
          path: UITestResults-${{ matrix.shard.id }}.xcresult
          retention-days: 30
          if-no-files-found: error

  uitest:
    name: UI Tests
    runs-on: macos-15
    needs: uitest-shard
