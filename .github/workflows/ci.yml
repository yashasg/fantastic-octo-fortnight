# Eye & Posture Reminder — CI/CD Pipeline
#
# Tag format (for release tracking):
#   v0.x.x  — During TestFlight beta phase (pre-App Store)
#   v1.0.0  — App Store launch and beyond
#
# Annotated tags only. Created after a successful upload, not before.
# Format: git tag -a v1.0.0 -m "Release 1.0.0, build ${{ github.run_number }}"

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  actions: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  XCODE_VERSION: "26.4"
  SCHEME: "EyePostureReminder"
  # No .xcodeproj — project uses Swift Package Manager.
  # xcodebuild resolves the package directly from Package.swift.
  SIMULATOR: "platform=iOS Simulator,name=iPhone 16"
  DERIVED_DATA_PATH: "${{ github.workspace }}/DerivedData"

jobs:
  build-and-test:
    name: Build & Test
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1

      - name: Select Xcode ${{ env.XCODE_VERSION }}
        run: sudo xcode-select -switch /Applications/Xcode_${{ env.XCODE_VERSION }}.app/Contents/Developer

      - name: Ensure iOS Simulator runtime
        run: |
          if ! xcrun simctl list devices available 2>/dev/null | grep -q "iPhone"; then
            echo "No iOS simulators found — downloading runtime…"
            xcodebuild -downloadPlatform iOS -quiet || true
          fi
          echo "Available iOS simulators:"
          xcrun simctl list devices available | grep -i iphone | head -5

      # ── Versioning ──────────────────────────────────────────────────────────
      # CFBundleShortVersionString is managed via: ./scripts/build.sh version <x.y.z>
      # CFBundleVersion is auto-incremented here from github.run_number (guaranteed unique + increasing).
      # EPRCommitHash is a custom key for traceability (not used by Apple — informational only).
      #
      # NOTE: agvtool requires an .xcodeproj. Once the Xcode project is created,
      # replace the PlistBuddy calls below with:
      #   agvtool new-version -all ${{ github.run_number }}
      - name: Set build number + inject commit hash
        run: |
          COMMIT_HASH=$(git rev-parse --short HEAD)
          BUILD_NUMBER=${{ github.run_number }}
          echo "BUILD_NUMBER=$BUILD_NUMBER" >> $GITHUB_ENV
          echo "GIT_COMMIT_HASH=$COMMIT_HASH" >> $GITHUB_ENV

          PLIST="EyePostureReminder/Info.plist"
          if [[ -f "$PLIST" ]]; then
            /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $BUILD_NUMBER" "$PLIST" 2>/dev/null || true
            /usr/libexec/PlistBuddy -c "Add :EPRCommitHash string $COMMIT_HASH" "$PLIST" 2>/dev/null || \
            /usr/libexec/PlistBuddy -c "Set :EPRCommitHash $COMMIT_HASH" "$PLIST"
            MARKETING_VER=$(/usr/libexec/PlistBuddy -c "Print :CFBundleShortVersionString" "$PLIST" 2>/dev/null || echo "unknown")
            echo "MARKETING_VERSION=$MARKETING_VER" >> $GITHUB_ENV
            echo "Injected build=$BUILD_NUMBER commit=$COMMIT_HASH marketing=$MARKETING_VER into $PLIST"
          else
            echo "MARKETING_VERSION=unknown" >> $GITHUB_ENV
            echo "note: Info.plist not found — versioning will be applied when .xcodeproj is created"
          fi

      # ── Dependency cache ─────────────────────────────────────────────────────
      - name: Cache DerivedData
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830  # v4.3.0
        with:
          path: ${{ env.DERIVED_DATA_PATH }}
          key: derived-data-${{ runner.os }}-${{ hashFiles('Package.swift', 'Package.resolved') }}
          restore-keys: |
            derived-data-${{ runner.os }}-

      # ── Homebrew package cache ───────────────────────────────────────────────
      - name: Cache Homebrew packages
        id: brew-cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830  # v4.3.0
        with:
          path: |
            /opt/homebrew/Cellar/xcodegen
            /opt/homebrew/Cellar/swiftlint
          key: ${{ runner.os }}-brew-xcodegen-swiftlint-v1
          restore-keys: |
            ${{ runner.os }}-brew-xcodegen-swiftlint-

      # ── Build ────────────────────────────────────────────────────────────────
      - name: Build (simulator, no signing)
        run: ./scripts/build.sh build

      # ── Screen Time extension scaffold ──────────────────────────────────────
      # Compile-only validation. Runtime FamilyControls/DeviceActivity behavior
      # still requires #201 entitlement approval and physical-device testing.
      - name: Install XcodeGen
        run: |
          if brew list xcodegen &>/dev/null 2>&1; then
            brew link --overwrite xcodegen 2>/dev/null || true
          else
            brew install xcodegen
          fi

      - name: Build Screen Time extensions (simulator, no signing)
        run: ./scripts/setup-screentime.sh --build

      # ── Test ─────────────────────────────────────────────────────────────────
      - name: Test (simulator)
        run: ./scripts/build.sh test

      # ── Lint ─────────────────────────────────────────────────────────────────
      # if: always() ensures SwiftLint runs and reports even when earlier steps
      # (e.g. tests) fail — prevents silent lint gaps in a no-warning shop (#388).
      - name: Install SwiftLint
        if: always()
        run: |
          if brew list swiftlint &>/dev/null 2>&1; then
            brew link --overwrite swiftlint 2>/dev/null || true
          else
            brew install swiftlint
          fi

      - name: Lint (SwiftLint)
        if: always()
        run: ./scripts/build.sh lint

      # ── Coverage ─────────────────────────────────────────────────────────────
      - name: Report coverage
        if: always()
        run: |
          xcrun xccov view --report TestResults.xcresult

      - name: Enforce coverage threshold
        # Run on all outcomes so coverage is always enforced — even when earlier
        # steps fail — preventing asymmetric validation where a failing test run
        # silently bypasses the 80 % gate.
        if: always()
        run: |
          if [[ ! -d TestResults.xcresult ]]; then
            echo "::error::TestResults.xcresult not found — tests may have crashed before producing results"
            exit 1
          fi
          COVERAGE=$(xcrun xccov view --report --json TestResults.xcresult \
            | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['lineCoverage']*100)")
          echo "Line coverage: ${COVERAGE}%"
          if (( $(echo "$COVERAGE < 80" | bc -l) )); then
            echo "::error::Coverage ${COVERAGE}% is below the minimum threshold (80%)"
            exit 1
          fi

      # ── Artifacts ────────────────────────────────────────────────────────────
      - name: Collect dSYMs
        if: always()
        run: |
          find "${{ env.DERIVED_DATA_PATH }}" -name "*.dSYM" -exec cp -r {} . \; 2>/dev/null || true

      - name: Upload dSYMs
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        if: always()
        with:
          name: dSYMs-${{ env.MARKETING_VERSION }}-build${{ github.run_number }}
          path: "*.dSYM"
          retention-days: 90
          if-no-files-found: warn

      - name: Upload test results
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        if: always()
        with:
          name: test-results-${{ env.MARKETING_VERSION }}-build${{ github.run_number }}
          path: TestResults.xcresult
          retention-days: 30
          if-no-files-found: error

  uitest:
    name: UI Tests
    runs-on: macos-15
    needs: build-and-test
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1

      - name: Select Xcode ${{ env.XCODE_VERSION }}
        run: sudo xcode-select -switch /Applications/Xcode_${{ env.XCODE_VERSION }}.app/Contents/Developer

      - name: Ensure iOS Simulator runtime
        run: |
          if ! xcrun simctl list devices available 2>/dev/null | grep -q "iPhone"; then
            echo "No iOS simulators found — downloading runtime…"
            xcodebuild -downloadPlatform iOS -quiet || true
          fi
          echo "Available iOS simulators:"
          xcrun simctl list devices available | grep -i iphone | head -5

      # ── Dependency cache ─────────────────────────────────────────────────────
      - name: Cache DerivedData
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830  # v4.3.0
        with:
          path: ${{ env.DERIVED_DATA_PATH }}
          key: derived-data-${{ runner.os }}-${{ hashFiles('Package.swift', 'Package.resolved') }}
          restore-keys: |
            derived-data-${{ runner.os }}-

      # ── Homebrew package cache ───────────────────────────────────────────────
      - name: Cache Homebrew packages
        id: brew-cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830  # v4.3.0
        with:
          path: /opt/homebrew/Cellar/xcodegen
          key: ${{ runner.os }}-brew-xcodegen-v1
          restore-keys: |
            ${{ runner.os }}-brew-xcodegen-

      - name: Install XcodeGen
        run: |
          if brew list xcodegen &>/dev/null 2>&1; then
            brew link --overwrite xcodegen 2>/dev/null || true
          else
            brew install xcodegen
          fi

      - name: Generate UITest xcodeproj
        run: ./scripts/setup-uitests.sh

      - name: Boot Simulator
        run: |
          # Erase to ensure a clean state (avoids stale SpringBoard caches)
          xcrun simctl shutdown "iPhone 16" 2>/dev/null || true
          xcrun simctl erase "iPhone 16" 2>/dev/null || true
          xcrun simctl boot "iPhone 16" 2>/dev/null || true
          # Wait for simulator to finish booting
          xcrun simctl bootstatus "iPhone 16" -b 2>/dev/null || sleep 10
          # Wait for SpringBoard to be fully initialized (critical for UI tests)
          echo "Waiting for SpringBoard to finish launching…"
          for i in $(seq 1 30); do
            if xcrun simctl spawn booted launchctl print system 2>/dev/null | grep -q "com.apple.SpringBoard"; then
              echo "SpringBoard is ready (after ${i}s)"
              break
            fi
            sleep 1
          done
          # Extra settle time for system services
          sleep 5

      - name: Run UI Tests
        run: ./scripts/build.sh uitest

      - name: Upload UI test results
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        if: always()
        with:
          name: ui-test-results-build${{ github.run_number }}
          path: UITestResults.xcresult
          retention-days: 30
          if-no-files-found: error
