# SwiftLint Configuration — Eye & Posture Reminder
# https://github.com/realm/SwiftLint

# ── Excluded paths ────────────────────────────────────────────────────────────
excluded:
  - .build
  - DerivedData
  - EyePostureReminder/DerivedData
  - EyePostureReminder/.build
  - Pods
  - vendor

# ── Enabled opt-in rules ──────────────────────────────────────────────────────
opt_in_rules:
  - array_init
  - closure_spacing
  - collection_alignment
  - contains_over_filter_count
  - contains_over_filter_is_empty
  - contains_over_first_not_nil
  - empty_collection_literal
  - empty_count
  - empty_string
  - enum_case_associated_values_count
  - explicit_init
  - fallthrough
  - first_where
  - flatmap_over_map_reduce
  - force_unwrapping
  - identical_operands
  - joined_default_parameter
  - last_where
  - legacy_multiple
  - literal_expression_end_indentation
  - lower_acl_than_parent
  - multiline_arguments
  - multiline_function_chains
  - multiline_literal_brackets
  - multiline_parameters
  - operator_usage_whitespace
  - overridden_super_call
  - pattern_matching_keywords
  - prefer_self_type_over_type_of_self
  - prohibited_super_call
  - redundant_nil_coalescing
  - redundant_type_annotation
  - sorted_imports
  - toggle_bool
  - unneeded_parentheses_in_closure_argument
  - vertical_parameter_alignment_on_call
  - yoda_condition

# ── Disabled rules ────────────────────────────────────────────────────────────
disabled_rules:
  # SwiftUI View bodies are legitimately long — don't penalise them
  - function_body_length
  # SwiftUI previews and complex views can have many params
  - large_tuple
  # Opening braces on new lines is valid in SwiftUI DSL
  - opening_brace
  # trailing_whitespace conflicts with some editors; enforced by .editorconfig
  - trailing_whitespace
  # trailing_closure has no valid config options in current SwiftLint; disabled to avoid multi-arg SwiftUI DSL noise
  - trailing_closure

# ── Rule configuration ────────────────────────────────────────────────────────
line_length:
  warning: 120
  error: 160
  ignores_comments: true
  ignores_urls: true

type_body_length:
  warning: 300
  error: 500

file_length:
  warning: 500
  error: 800
  ignore_comment_only_lines: true

cyclomatic_complexity:
  warning: 15
  error: 25

identifier_name:
  min_length:
    warning: 2
    error: 1
  max_length:
    warning: 60
    error: 80
  excluded:
    - id
    - x
    - y

nesting:
  type_level:
    warning: 3
  function_level:
    warning: 4

# Allow force_try in tests but warn in app code
force_try:
  severity: warning

# Multiline arguments — allow trailing closure style common in SwiftUI
multiline_arguments:
  first_argument_location: next_line
  only_enforce_after_first_closure_on_first_line: true

# trailing_closure disabled — multi-argument SwiftUI DSL calls don't need it
# (only_single_mutable_parameter was invalid in current SwiftLint)
